<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="referrer" content="no-referrer" />
    <title>手机图片编辑</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #20242a;
        --muted: #737982;
        --line: #e4e7eb;
        --soft: #f5f6f7;
        --accent: #16745f;
        --danger: #b42318;
      }

      * {
        box-sizing: border-box;
      }

      [hidden] {
        display: none !important;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background: #fff;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", "Microsoft YaHei", sans-serif;
      }

      header {
        position: sticky;
        top: 0;
        z-index: 10;
        padding: calc(12px + env(safe-area-inset-top)) 16px 12px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.94);
        backdrop-filter: blur(16px);
      }

      .app-header,
      .history-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      h1 {
        margin: 0;
        font-size: 24px;
        letter-spacing: 0;
      }

      main {
        padding: 14px 14px calc(140px + env(safe-area-inset-bottom));
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 14px;
        background: #fff;
        overflow: hidden;
      }

      .images {
        display: grid;
        gap: 12px;
      }

      .slot {
        min-height: 260px;
        display: grid;
        place-items: center;
        padding: 12px;
        background:
          linear-gradient(var(--line) 1px, transparent 1px),
          linear-gradient(90deg, var(--line) 1px, transparent 1px),
          #fff;
        background-size: 120px 120px;
      }

      .slot img {
        max-width: 100%;
        max-height: 70vh;
        object-fit: contain;
        border-radius: 10px;
      }

      .placeholder {
        color: var(--muted);
        text-align: center;
        line-height: 1.5;
      }

      .refs {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(86px, 1fr));
        gap: 8px;
        width: 100%;
      }

      .thumb {
        position: relative;
        min-height: 104px;
        border: 1px solid var(--line);
        border-radius: 10px;
        overflow: hidden;
        background: #fff;
      }

      .thumb img {
        width: 100%;
        height: 112px;
        object-fit: contain;
      }

      .badge,
      .remove {
        position: absolute;
        top: 6px;
        display: grid;
        place-items: center;
        width: 26px;
        height: 26px;
        border: 0;
        border-radius: 999px;
        color: #fff;
        background: rgba(0, 0, 0, 0.72);
        font-weight: 760;
      }

      .badge {
        left: 6px;
      }

      .remove {
        right: 6px;
        padding: 0;
      }

      .composer {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 20;
        padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
        border-top: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.96);
        backdrop-filter: blur(16px);
      }

      textarea {
        width: 100%;
        min-height: 68px;
        max-height: 160px;
        resize: vertical;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px 12px;
        color: var(--ink);
        outline: none;
      }

      .bar {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 8px;
      }

      button,
      select,
      input {
        font: inherit;
      }

      button,
      select {
        min-height: 40px;
        border: 0;
        border-radius: 999px;
        padding: 0 12px;
        background: var(--soft);
        color: var(--ink);
      }

      .send {
        margin-left: auto;
        min-width: 56px;
        color: #fff;
        background: var(--accent);
        font-weight: 760;
      }

      .send:disabled {
        opacity: 0.55;
      }

      .file-input {
        display: none;
      }

      .settings {
        position: fixed;
        inset: auto 10px calc(126px + env(safe-area-inset-bottom)) 10px;
        z-index: 30;
        max-height: 62vh;
        overflow: auto;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: #fff;
        box-shadow: 0 18px 50px rgba(23, 30, 38, 0.18);
      }

      .row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 6px;
        margin-bottom: 12px;
      }

      .row label {
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .row input,
      .row select {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fff;
      }

      .key-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
      }

      .timer {
        margin: 10px 0;
        color: #111820;
        font-size: 18px;
        font-weight: 800;
        text-align: center;
      }

      .message {
        min-height: 22px;
        margin-top: 8px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .message.error {
        color: var(--danger);
      }

      .download {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 40px;
        border-radius: 999px;
        padding: 0 14px;
        color: #fff;
        background: var(--accent);
        text-decoration: none;
        font-weight: 760;
      }

      .history {
        position: fixed;
        inset: 0;
        z-index: 40;
        overflow: auto;
        padding: calc(14px + env(safe-area-inset-top)) 14px calc(24px + env(safe-area-inset-bottom));
        background: #fff;
      }

      .history-toolbar {
        position: sticky;
        top: calc(-14px - env(safe-area-inset-top));
        z-index: 1;
        margin: calc(-14px - env(safe-area-inset-top)) -14px 14px;
        padding: calc(14px + env(safe-area-inset-top)) 14px 12px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.96);
        backdrop-filter: blur(16px);
      }

      .history-toolbar h2 {
        margin: 0;
        font-size: 20px;
      }

      .history-actions {
        display: flex;
        gap: 8px;
      }

      .history-list {
        display: grid;
        gap: 10px;
      }

      .history-item {
        display: grid;
        grid-template-columns: 76px minmax(0, 1fr) auto;
        align-items: center;
        gap: 10px;
        min-height: 92px;
        padding: 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .history-item img {
        width: 76px;
        height: 76px;
        border-radius: 6px;
        object-fit: contain;
        background: var(--soft);
      }

      .history-copy {
        min-width: 0;
      }

      .history-title {
        overflow: hidden;
        margin-bottom: 5px;
        font-weight: 760;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .history-meta,
      .history-empty {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .history-empty {
        padding: 60px 12px;
        text-align: center;
      }

      .history-delete {
        color: var(--danger);
      }
    </style>
  </head>
  <body>
    <header class="app-header">
      <h1>手机图片编辑</h1>
      <button type="button" id="openHistory">记录</button>
    </header>

    <section class="history" id="history" hidden>
      <div class="history-toolbar">
        <h2>会话记录</h2>
        <div class="history-actions">
          <button type="button" class="history-delete" id="clearHistory">清空</button>
          <button type="button" id="closeHistory">关闭</button>
        </div>
      </div>
      <div class="history-list" id="historyList"></div>
    </section>

    <main>
      <section class="images">
        <div class="panel slot">
          <div class="placeholder" id="inputPlaceholder">选择或拍摄参考图</div>
          <div class="refs" id="inputList" hidden></div>
        </div>
        <div class="timer" id="timer" hidden>正在编辑图片... 已用 0.0 秒</div>
        <div class="panel slot">
          <div class="placeholder" id="resultPlaceholder">结果会显示在这里</div>
          <img id="resultImage" alt="编辑结果" hidden />
        </div>
        <a class="download" id="downloadLink" href="#" download="edited-image.png" hidden>下载结果</a>
        <div class="message" id="message"></div>
      </section>
    </main>

    <section class="settings" id="settings" hidden>
      <div class="row">
        <label for="provider">服务</label>
        <select id="provider">
          <option value="yunwu" selected>第三方 OpenAI</option>
          <option value="openai">OpenAI</option>
          <option value="xai">xAI / Grok</option>
          <option value="third-grok">第三方 Grok</option>
        </select>
      </div>

      <div class="row">
        <label for="apiKey">当前服务 API key</label>
        <div class="key-row">
          <input id="apiKey" type="password" autocomplete="off" placeholder="sk- 或 xai-..." />
          <button type="button" id="saveKey">保存</button>
        </div>
      </div>

      <div class="row" id="baseUrlRow">
        <label for="baseUrl" id="baseUrlLabel">第三方 Base URL</label>
        <input id="baseUrl" type="url" value="https://api.zhongzhuan.chat/v1" />
      </div>

      <div class="row openai-setting">
        <label for="openaiModel">OpenAI 模型</label>
        <select id="openaiModel">
          <option value="gpt-image-2">gpt-image-2</option>
        </select>
      </div>

      <div class="row grok-setting" hidden>
        <label for="grokModel">Grok 模型</label>
        <select id="grokModel" class="official-grok-setting">
          <option value="grok-imagine-image-quality">grok-imagine-image-quality</option>
          <option value="grok-imagine-image" selected>grok-imagine-image</option>
        </select>
        <input id="thirdGrokModel" class="third-grok-setting" type="text" value="grok-imagine-image" placeholder="填写第三方模型名" hidden />
      </div>

      <div class="row">
        <label for="count">数量</label>
        <select id="count">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
        </select>
      </div>

      <div class="row openai-setting">
        <label for="size">OpenAI size</label>
        <select id="size">
          <option value="auto">auto</option>
          <option value="1024x1024">1024x1024</option>
          <option value="1536x1024">1536x1024</option>
          <option value="1024x1536" selected>1024x1536</option>
          <option value="2048x2048">2048x2048</option>
          <option value="2048x1152">2048x1152</option>
          <option value="3840x2160">3840x2160</option>
          <option value="2160x3840">2160x3840</option>
        </select>
      </div>

      <div class="row openai-setting">
        <label for="quality">OpenAI quality</label>
        <select id="quality">
          <option value="auto">auto</option>
          <option value="high">high</option>
          <option value="medium" selected>medium</option>
          <option value="low">low</option>
        </select>
      </div>

      <div class="row openai-setting">
        <label for="outputFormat">OpenAI output format</label>
        <select id="outputFormat">
          <option value="png" selected>PNG</option>
          <option value="jpeg">JPEG</option>
          <option value="webp">WEBP</option>
        </select>
      </div>

      <div class="row openai-setting">
        <label for="background">OpenAI background</label>
        <select id="background">
          <option value="auto" selected>auto</option>
          <option value="transparent">transparent</option>
          <option value="opaque">opaque</option>
        </select>
      </div>

      <div class="row openai-setting">
        <label for="moderation">OpenAI moderation</label>
        <select id="moderation">
          <option value="low" selected>low</option>
          <option value="auto">auto</option>
        </select>
      </div>

      <div class="row grok-setting" hidden>
        <label for="resolution">Grok resolution</label>
        <select id="resolution">
          <option value="1k">1k</option>
          <option value="2k" selected>2k</option>
        </select>
      </div>

      <div class="row grok-setting third-grok-setting" id="aspectRatioRow" hidden>
        <label for="aspectRatio">Grok aspect ratio</label>
        <select id="aspectRatio">
          <option value="1:1" selected>1:1</option>
          <option value="3:4">3:4</option>
          <option value="4:3">4:3</option>
          <option value="9:16">9:16</option>
          <option value="16:9">16:9</option>
          <option value="2:3">2:3</option>
          <option value="3:2">3:2</option>
        </select>
      </div>
    </section>

    <section class="composer">
      <textarea id="prompt" placeholder="输入图片编辑提示词..."></textarea>
      <div class="bar">
        <input class="file-input" id="imageFile" type="file" accept="image/*" multiple />
        <button type="button" id="pickImage">图片</button>
        <button type="button" id="clearImages">清空</button>
        <button type="button" id="toggleSettings">设置</button>
        <button type="button" class="send" id="send">生成</button>
      </div>
    </section>

    <script>
      const state = {
        images: [],
        timerId: null,
        startedAt: 0,
      };

      const HISTORY_DB = "image-editor-mobile";
      const HISTORY_STORE = "sessions";
      const HISTORY_LIMIT = 20;

      const els = {
        provider: document.querySelector("#provider"),
        history: document.querySelector("#history"),
        historyList: document.querySelector("#historyList"),
        openHistory: document.querySelector("#openHistory"),
        closeHistory: document.querySelector("#closeHistory"),
        clearHistory: document.querySelector("#clearHistory"),
        apiKey: document.querySelector("#apiKey"),
        baseUrl: document.querySelector("#baseUrl"),
        baseUrlLabel: document.querySelector("#baseUrlLabel"),
        saveKey: document.querySelector("#saveKey"),
        settings: document.querySelector("#settings"),
        toggleSettings: document.querySelector("#toggleSettings"),
        file: document.querySelector("#imageFile"),
        pickImage: document.querySelector("#pickImage"),
        clearImages: document.querySelector("#clearImages"),
        inputList: document.querySelector("#inputList"),
        inputPlaceholder: document.querySelector("#inputPlaceholder"),
        prompt: document.querySelector("#prompt"),
        send: document.querySelector("#send"),
        timer: document.querySelector("#timer"),
        resultImage: document.querySelector("#resultImage"),
        resultPlaceholder: document.querySelector("#resultPlaceholder"),
        message: document.querySelector("#message"),
        downloadLink: document.querySelector("#downloadLink"),
        openaiModel: document.querySelector("#openaiModel"),
        grokModel: document.querySelector("#grokModel"),
        thirdGrokModel: document.querySelector("#thirdGrokModel"),
        count: document.querySelector("#count"),
        size: document.querySelector("#size"),
        quality: document.querySelector("#quality"),
        outputFormat: document.querySelector("#outputFormat"),
        background: document.querySelector("#background"),
        moderation: document.querySelector("#moderation"),
        resolution: document.querySelector("#resolution"),
        aspectRatio: document.querySelector("#aspectRatio"),
      };

      function storageKey(provider) {
        return `mobile_image_key_${provider}`;
      }

      function openHistoryDb() {
        return new Promise((resolve, reject) => {
          const request = indexedDB.open(HISTORY_DB, 1);
          request.onupgradeneeded = () => {
            const db = request.result;
            if (!db.objectStoreNames.contains(HISTORY_STORE)) {
              db.createObjectStore(HISTORY_STORE, { keyPath: "id" });
            }
          };
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      }

      async function historyOperation(mode, operation) {
        const db = await openHistoryDb();
        return new Promise((resolve, reject) => {
          const transaction = db.transaction(HISTORY_STORE, mode);
          const store = transaction.objectStore(HISTORY_STORE);
          let result;
          try {
            result = operation(store);
          } catch (error) {
            db.close();
            reject(error);
            return;
          }
          transaction.oncomplete = () => {
            db.close();
            resolve(result?.result);
          };
          transaction.onerror = () => {
            db.close();
            reject(transaction.error);
          };
        });
      }

      async function getHistorySessions() {
        const sessions = (await historyOperation("readonly", (store) => store.getAll())) || [];
        return sessions.sort((a, b) => b.createdAt - a.createdAt);
      }

      async function saveHistorySession(session) {
        if (navigator.storage?.persist) navigator.storage.persist().catch(() => {});
        await historyOperation("readwrite", (store) => store.put(session));
        const sessions = await getHistorySessions();
        for (const oldSession of sessions.slice(HISTORY_LIMIT)) {
          await historyOperation("readwrite", (store) => store.delete(oldSession.id));
        }
      }

      function deleteHistorySession(id) {
        return historyOperation("readwrite", (store) => store.delete(id));
      }

      function clearHistorySessions() {
        return historyOperation("readwrite", (store) => store.clear());
      }

      function blobToDataUrl(blob) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result));
          reader.onerror = () => reject(reader.error);
          reader.readAsDataURL(blob);
        });
      }

      async function makeDurableImageRef(url) {
        if (!url || url.startsWith("data:")) return url;
        try {
          const response = await fetch(url);
          if (!response.ok) return url;
          return await blobToDataUrl(await response.blob());
        } catch {
          return url;
        }
      }

      function currentModel() {
        if (els.provider.value === "xai") return els.grokModel.value;
        if (els.provider.value === "third-grok") return els.thirdGrokModel.value.trim();
        return els.openaiModel.value;
      }

      function restoreHistorySession(session) {
        if ([...els.provider.options].some((option) => option.value === session.provider)) {
          els.provider.value = session.provider;
        }
        syncProviderUI();
        if (session.provider === "xai" && [...els.grokModel.options].some((option) => option.value === session.model)) {
          els.grokModel.value = session.model;
        } else if (session.provider === "third-grok" && session.model) {
          els.thirdGrokModel.value = session.model;
        } else if (session.model && [...els.openaiModel.options].some((option) => option.value === session.model)) {
          els.openaiModel.value = session.model;
        }
        els.prompt.value = session.prompt || "";
        state.images = Array.isArray(session.inputImages) ? [...session.inputImages] : [];
        renderInputs();
        if (session.resultImage) {
          els.resultImage.src = session.resultImage;
          els.resultImage.hidden = false;
          els.resultPlaceholder.hidden = true;
          els.downloadLink.href = session.resultImage;
          els.downloadLink.hidden = false;
        } else {
          els.resultImage.removeAttribute("src");
          els.resultImage.hidden = true;
          els.resultPlaceholder.hidden = false;
          els.downloadLink.hidden = true;
        }
        els.history.hidden = true;
        setMessage("已恢复会话，可以继续编辑。 ");
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      async function renderHistory() {
        els.historyList.innerHTML = '<div class="history-empty">正在读取记录...</div>';
        try {
          const sessions = await getHistorySessions();
          els.historyList.innerHTML = "";
          if (!sessions.length) {
            els.historyList.innerHTML = '<div class="history-empty">还没有会话记录。</div>';
            return;
          }
          sessions.forEach((session) => {
            const item = document.createElement("article");
            item.className = "history-item";
            const image = document.createElement("img");
            image.src = session.resultImage || session.inputImages?.[0] || "";
            image.alt = "会话结果";
            const copy = document.createElement("div");
            copy.className = "history-copy";
            const title = document.createElement("div");
            title.className = "history-title";
            title.textContent = session.prompt || "未命名会话";
            const meta = document.createElement("div");
            meta.className = "history-meta";
            meta.textContent = `${new Date(session.createdAt).toLocaleString()} · ${session.provider}`;
            copy.append(title, meta);
            const remove = document.createElement("button");
            remove.type = "button";
            remove.className = "history-delete";
            remove.textContent = "删除";
            remove.addEventListener("click", async () => {
              await deleteHistorySession(session.id);
              await renderHistory();
            });
            item.addEventListener("click", (event) => {
              if (event.target !== remove) restoreHistorySession(session);
            });
            item.append(image, copy, remove);
            els.historyList.appendChild(item);
          });
        } catch (error) {
          els.historyList.innerHTML = "";
          const message = document.createElement("div");
          message.className = "history-empty";
          message.textContent = `读取失败：${error.message || "浏览器不支持本地数据库"}`;
          els.historyList.appendChild(message);
        }
      }

      function setMessage(text, isError = false) {
        els.message.textContent = text;
        els.message.classList.toggle("error", isError);
      }

      function getLimit() {
        if (els.provider.value === "xai") return 1;
        if (els.provider.value === "third-grok") return 3;
        return 10;
      }

      function formatElapsed(ms) {
        return `${(ms / 1000).toFixed(1)} 秒`;
      }

      function startTimer() {
        stopTimer();
        state.startedAt = performance.now();
        els.timer.hidden = false;
        els.timer.textContent = "正在编辑图片... 已用 0.0 秒";
        state.timerId = window.setInterval(() => {
          els.timer.textContent = `正在编辑图片... 已用 ${formatElapsed(performance.now() - state.startedAt)}`;
        }, 100);
      }

      function stopTimer(label) {
        if (state.timerId) {
          clearInterval(state.timerId);
          state.timerId = null;
        }
        if (label) {
          els.timer.hidden = false;
          els.timer.textContent = `${label}，用时 ${formatElapsed(performance.now() - state.startedAt)}`;
        }
      }

      function renderInputs() {
        els.inputList.innerHTML = "";
        if (!state.images.length) {
          els.inputList.hidden = true;
          els.inputPlaceholder.hidden = false;
          return;
        }

        state.images.forEach((src, index) => {
          const wrap = document.createElement("div");
          wrap.className = "thumb";
          const img = document.createElement("img");
          img.src = src;
          const badge = document.createElement("div");
          badge.className = "badge";
          badge.textContent = index + 1;
          const remove = document.createElement("button");
          remove.className = "remove";
          remove.type = "button";
          remove.textContent = "×";
          remove.addEventListener("click", () => {
            state.images.splice(index, 1);
            renderInputs();
          });
          wrap.append(img, badge, remove);
          els.inputList.appendChild(wrap);
        });
        els.inputList.hidden = false;
        els.inputPlaceholder.hidden = true;
      }

      function readFile(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result));
          reader.onerror = () => reject(new Error(`读取失败：${file.name}`));
          reader.readAsDataURL(file);
        });
      }

      async function addFiles(files) {
        const imageFiles = Array.from(files || []).filter((file) => file.type.startsWith("image/"));
        const limit = getLimit();
        const available = Math.max(0, limit - state.images.length);
        const accepted = imageFiles.slice(0, available);
        if (!accepted.length) {
          setMessage(`当前服务最多支持 ${limit} 张图片。`, true);
          return;
        }
        const dataUrls = await Promise.all(accepted.map(readFile));
        state.images.push(...dataUrls);
        renderInputs();
        setMessage(`已加入 ${accepted.length} 张图片，共 ${state.images.length} 张。`);
      }

      function syncProviderUI() {
        const isGrok = els.provider.value === "xai" || els.provider.value === "third-grok";
        const isThirdGrok = els.provider.value === "third-grok";
        document.querySelectorAll(".openai-setting").forEach((node) => (node.hidden = isGrok));
        document.querySelectorAll(".grok-setting").forEach((node) => (node.hidden = !isGrok));
        document.querySelectorAll(".official-grok-setting").forEach((node) => (node.hidden = !isGrok || isThirdGrok));
        document.querySelectorAll(".third-grok-setting").forEach((node) => (node.hidden = !isThirdGrok));
        document.querySelector("#baseUrlRow").hidden = els.provider.value !== "yunwu" && !isThirdGrok;
        els.apiKey.value = localStorage.getItem(storageKey(els.provider.value)) || "";
        if (isThirdGrok) {
          els.baseUrlLabel.textContent = "第三方 Grok Base URL";
          els.baseUrl.value = localStorage.getItem("mobile_third_grok_base_url") || "https://api.x.ai/v1";
          els.thirdGrokModel.value = localStorage.getItem("mobile_third_grok_model") || "grok-imagine-image";
        } else {
          els.baseUrlLabel.textContent = "第三方 OpenAI Base URL";
          els.baseUrl.value = localStorage.getItem("mobile_yunwu_base_url") || "https://api.zhongzhuan.chat/v1";
        }
        const limit = getLimit();
        if (state.images.length > limit) {
          setMessage(`当前服务最多支持 ${limit} 张图片，请删除多余图片。`, true);
        }
      }

      function dataUrlToBlob(dataUrl) {
        const [meta, base64] = dataUrl.split(",");
        const mime = /data:([^;]+)/.exec(meta)?.[1] || "image/png";
        const bytes = atob(base64);
        const array = new Uint8Array(bytes.length);
        for (let i = 0; i < bytes.length; i += 1) array[i] = bytes.charCodeAt(i);
        return new Blob([array], { type: mime });
      }

      async function callOpenAICompatible(endpoint, key) {
        const form = new FormData();
        state.images.forEach((src, index) => {
          const blob = dataUrlToBlob(src);
          form.append("image", blob, `input-${index + 1}.${blob.type.includes("webp") ? "webp" : blob.type.includes("jpeg") ? "jpg" : "png"}`);
        });
        form.append("prompt", els.prompt.value.trim());
        form.append("model", els.openaiModel.value);
        form.append("n", els.count.value);
        form.append("size", els.size.value);
        form.append("quality", els.quality.value);
        form.append("output_format", els.outputFormat.value);
        form.append("background", els.background.value);
        form.append("moderation", els.moderation.value);

        const response = await fetch(endpoint, {
          method: "POST",
          headers: { Authorization: `Bearer ${key}` },
          body: form,
        });
        const data = await response.json().catch(async () => ({ raw: await response.text() }));
        if (!response.ok) throw new Error(data.error?.message || data.error || data.message || data.raw || "请求失败");
        return data;
      }

      function imageEditEndpointFromBase(baseUrl) {
        const trimmed = String(baseUrl || "").trim().replace(/\/+$/, "");
        if (trimmed.endsWith("/images/edits")) return trimmed;
        if (/\/v\d+$/i.test(trimmed)) return `${trimmed}/images/edits`;
        return `${trimmed}/v1/images/edits`;
      }

      async function callXai(key, provider) {
        const imagePayloads = state.images.map((src) => ({ url: src, type: "image_url" }));
        let body;
        let endpoint = "https://api.x.ai/v1/images/edits";
        if (provider === "xai") {
          body = {
            model: els.grokModel.value,
            prompt: els.prompt.value.trim(),
            n: Number(els.count.value),
            resolution: els.resolution.value,
            image: { url: state.images[0] },
          };
        } else {
          endpoint = imageEditEndpointFromBase(localStorage.getItem("mobile_third_grok_base_url") || els.baseUrl.value);
          body = {
            model: els.thirdGrokModel.value.trim() || "grok-imagine-image",
            prompt: els.prompt.value.trim(),
            n: Number(els.count.value),
            resolution: els.resolution.value,
            aspect_ratio: els.aspectRatio.value,
          };
          if (imagePayloads.length === 1) body.image = imagePayloads[0];
          else body.images = imagePayloads;
        }

        const response = await fetch(endpoint, {
          method: "POST",
          headers: {
            Authorization: `Bearer ${key}`,
            "Content-Type": "application/json",
          },
          body: JSON.stringify(body),
        });
        const data = await response.json().catch(async () => ({ raw: await response.text() }));
        if (!response.ok) throw new Error(data.error?.message || data.error || data.message || data.raw || "请求失败");
        return data;
      }

      function showResult(data) {
        const first = data.data?.[0] || data.images?.[0] || data.image || (data.url || data.b64_json ? data : null);
        if (!first) throw new Error("返回中没有图片。");
        let url = typeof first === "string" ? first : first.url;
        if (!url && first.b64_json) {
          url = `data:image/${els.outputFormat.value || "png"};base64,${first.b64_json}`;
        }
        if (!url) throw new Error("返回中没有图片 URL 或 base64。");
        els.resultImage.src = url;
        els.resultImage.hidden = false;
        els.resultPlaceholder.hidden = true;
        els.downloadLink.href = url;
        els.downloadLink.hidden = false;
        return url;
      }

      els.openHistory.addEventListener("click", async () => {
        els.settings.hidden = true;
        els.history.hidden = false;
        await renderHistory();
      });
      els.closeHistory.addEventListener("click", () => {
        els.history.hidden = true;
      });
      els.clearHistory.addEventListener("click", async () => {
        if (!confirm("确定清空这台手机上的全部会话记录吗？")) return;
        await clearHistorySessions();
        await renderHistory();
      });

      els.toggleSettings.addEventListener("click", () => {
        els.settings.hidden = !els.settings.hidden;
      });
      els.provider.addEventListener("change", syncProviderUI);
      els.saveKey.addEventListener("click", () => {
        localStorage.setItem(storageKey(els.provider.value), els.apiKey.value.trim());
        if (els.provider.value === "yunwu") {
          localStorage.setItem("mobile_yunwu_base_url", els.baseUrl.value.trim().replace(/\/+$/, ""));
        } else if (els.provider.value === "third-grok") {
          localStorage.setItem("mobile_third_grok_base_url", els.baseUrl.value.trim().replace(/\/+$/, ""));
          localStorage.setItem("mobile_third_grok_model", els.thirdGrokModel.value.trim());
        }
        setMessage("已保存到手机浏览器本地。");
      });
      els.pickImage.addEventListener("click", () => els.file.click());
      els.file.addEventListener("change", () => addFiles(els.file.files));
      els.clearImages.addEventListener("click", () => {
        state.images = [];
        renderInputs();
        els.resultImage.hidden = true;
        els.resultPlaceholder.hidden = false;
        els.downloadLink.hidden = true;
      });

      els.send.addEventListener("click", async () => {
        const provider = els.provider.value;
        const key = localStorage.getItem(storageKey(provider)) || els.apiKey.value.trim();
        if (!key) {
          setMessage("请先在设置里保存当前服务的 API key。", true);
          els.settings.hidden = false;
          return;
        }
        if (!state.images.length) {
          setMessage("请先选择图片。", true);
          return;
        }
        if (state.images.length > getLimit()) {
          setMessage(`当前服务最多支持 ${getLimit()} 张图片。`, true);
          return;
        }
        if (!els.prompt.value.trim()) {
          setMessage("请输入提示词。", true);
          return;
        }

        els.send.disabled = true;
        els.resultImage.hidden = true;
        els.resultPlaceholder.hidden = false;
        els.downloadLink.hidden = true;
        setMessage("");
        startTimer();
        try {
          let data;
          if (provider === "xai" || provider === "third-grok") {
            data = await callXai(key, provider);
          } else {
            const endpoint =
              provider === "yunwu"
                ? `${(localStorage.getItem("mobile_yunwu_base_url") || els.baseUrl.value || "https://api.zhongzhuan.chat/v1").replace(/\/+$/, "")}/images/edits`
                : "https://api.openai.com/v1/images/edits";
            data = await callOpenAICompatible(endpoint, key);
          }
          const resultUrl = showResult(data);
          stopTimer("编辑完成");
          try {
            await saveHistorySession({
              id: `${Date.now()}-${crypto.randomUUID?.() || Math.random().toString(36).slice(2)}`,
              createdAt: Date.now(),
              prompt: els.prompt.value.trim(),
              provider,
              model: currentModel(),
              inputImages: [...state.images],
              resultImage: await makeDurableImageRef(resultUrl),
            });
            setMessage("完成，已保存到会话记录。长按结果图可保存。");
          } catch (historyError) {
            setMessage(`图片已生成，但记录保存失败：${historyError.message || "手机存储空间不足"}`, true);
          }
        } catch (error) {
          stopTimer("编辑失败");
          setMessage(error.message || "请求失败。可能是浏览器跨域限制或接口拒绝。", true);
        } finally {
          els.send.disabled = false;
        }
      });

      syncProviderUI();
    </script>
  </body>
</html>
